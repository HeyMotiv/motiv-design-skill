<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Details Card — Metric Variants</title>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #1A1A1F;
            font-family: 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 48px 24px 64px;
        }

        .page-title {
            color: rgba(255,255,255,0.4);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .cards-row {
            display: flex;
            gap: 28px;
            align-items: flex-start;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        .card-col-label {
            color: rgba(255,255,255,0.35);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        /* ── DS tokens ── */
        :root {
            --primary-100: #2B2E34;
            --primary-60: #6B7280;
            --primary-30: #9CA3AF;
            --surface-white: #FFFFFF;
            --color-text-primary: #2B2E34;
            --color-text-secondary: #6B7280;
            --color-border-default: #E8E4F0;
            --radius-lg: 12px;
            --radius-pill: 999px;
            --brand-accent: #7B5EA7;
            --brand-tint: #F3EEF9;
            --spacing-md: 16px;
            --spacing-2xs: 2px;
            --spacing-xs: 4px;
        }

        /* ── Details card wrapper ── */
        .card-wrap {
            width: 280px;
        }

        .stats-section-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--color-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 8px;
        }

        .grouped-card {
            background: var(--surface-white);
            border: 1px solid var(--color-border-default);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        .grouped-card-row {
            display: flex;
            align-items: stretch;
        }

        .grouped-stat {
            flex: 1;
            padding: 18px var(--spacing-md);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: var(--spacing-2xs);
        }

        .grouped-stat-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-pill);
            background: var(--brand-tint);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 6px;
        }

        .grouped-stat-icon svg {
            width: 20px;
            height: 20px;
            color: var(--brand-accent);
        }

        .grouped-stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--brand-accent);
            line-height: 1;
            margin-bottom: var(--spacing-xs);
        }

        .grouped-stat-label {
            font-size: 12px;
            font-weight: 500;
            line-height: 18px;
            color: var(--color-text-secondary);
        }

        .grouped-divider {
            width: 1px;
            height: 40px;
            background: var(--color-border-default);
            flex-shrink: 0;
            align-self: center;
        }

    </style>
</head>
<body>

    <div class="page-title">Details Card — Metric Variants</div>

    <div class="cards-row">

        <!-- ── STEPS ── -->
        <div class="card-col">
            <div class="card-col-label">Steps</div>
            <div class="card-wrap">
                <div class="stats-section-title">Details</div>
                <div class="grouped-card">
                    <div class="grouped-card-row">
                        <div class="grouped-stat">
                            <div class="grouped-stat-icon">
                                <!-- Bar chart / difficulty icon -->
                                <svg viewBox="0 0 16 16" fill="none">
                                    <rect x="2" y="10" width="3" height="4" rx="0.5" fill="currentColor"/>
                                    <rect x="6.5" y="6" width="3" height="8" rx="0.5" fill="currentColor"/>
                                    <rect x="11" y="2" width="3" height="12" rx="0.5" fill="currentColor" opacity="0.25"/>
                                </svg>
                            </div>
                            <div class="grouped-stat-value">Strong</div>
                            <div class="grouped-stat-label">Difficulty</div>
                        </div>
                        <div class="grouped-divider"></div>
                        <div class="grouped-stat">
                            <div class="grouped-stat-icon">
                                <!-- Walking figure (Material Icons directions_walk) -->
                                <svg viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M13.49 5.48c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm-3.6 13.9l1-4.4 2.1 2v6h2v-7.5l-2.1-2 .6-3c1.3 1.5 3.3 2.5 5.5 2.5v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1l-5.2 2.2v4.7h2v-3.4l1.8-.7-1.6 8.1-4.9-1-.4 2 7 1.4z"/>
                                </svg>
                            </div>
                            <div class="grouped-stat-value">Steps</div>
                            <div class="grouped-stat-label">What we track</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ── ACTIVE ENERGY ── -->
        <div class="card-col">
            <div class="card-col-label">Active Energy</div>
            <div class="card-wrap">
                <div class="stats-section-title">Details</div>
                <div class="grouped-card">
                    <div class="grouped-card-row">
                        <div class="grouped-stat">
                            <div class="grouped-stat-icon">
                                <svg viewBox="0 0 16 16" fill="none">
                                    <rect x="2" y="10" width="3" height="4" rx="0.5" fill="currentColor"/>
                                    <rect x="6.5" y="6" width="3" height="8" rx="0.5" fill="currentColor"/>
                                    <rect x="11" y="2" width="3" height="12" rx="0.5" fill="currentColor" opacity="0.25"/>
                                </svg>
                            </div>
                            <div class="grouped-stat-value">Strong</div>
                            <div class="grouped-stat-label">Difficulty</div>
                        </div>
                        <div class="grouped-divider"></div>
                        <div class="grouped-stat">
                            <div class="grouped-stat-icon">
                                <!-- Flame icon -->
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M12 12c2-2.96 0-7-1-8 0 3.038-1.773 4.741-3 6-1.226 1.26-2 3.24-2 5a6 6 0 1 0 12 0c0-1.532-1.056-3.94-2-5-1.786 3-2.791 3-4 2z"/>
                                </svg>
                            </div>
                            <div class="grouped-stat-value">Calories</div>
                            <div class="grouped-stat-label">What we track</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ── EXERCISE MINS ── -->
        <div class="card-col">
            <div class="card-col-label">Exercise Mins</div>
            <div class="card-wrap">
                <div class="stats-section-title">Details</div>
                <div class="grouped-card">
                    <div class="grouped-card-row">
                        <div class="grouped-stat">
                            <div class="grouped-stat-icon">
                                <svg viewBox="0 0 16 16" fill="none">
                                    <rect x="2" y="10" width="3" height="4" rx="0.5" fill="currentColor"/>
                                    <rect x="6.5" y="6" width="3" height="8" rx="0.5" fill="currentColor"/>
                                    <rect x="11" y="2" width="3" height="12" rx="0.5" fill="currentColor" opacity="0.25"/>
                                </svg>
                            </div>
                            <div class="grouped-stat-value">Strong</div>
                            <div class="grouped-stat-label">Difficulty</div>
                        </div>
                        <div class="grouped-divider"></div>
                        <div class="grouped-stat">
                            <div class="grouped-stat-icon">
                                <!-- Timer icon -->
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="13" r="8"/>
                                    <path d="M12 9v4l2.5 2.5"/>
                                    <path d="M9.5 3h5"/>
                                    <path d="M12 3v2"/>
                                </svg>
                            </div>
                            <div class="grouped-stat-value">Exercise</div>
                            <div class="grouped-stat-label">What we track</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
