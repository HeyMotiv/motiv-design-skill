function loadState(key) {
  const b64 = states[key];
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const blob = new Blob([bytes], {type: 'text/html'});
  const url = URL.createObjectURL(blob);
  const iframe = document.getElementById('state-frame');
  if (iframe._blobUrl) URL.revokeObjectURL(iframe._blobUrl);
  iframe._blobUrl = url;
  iframe.src = url;
}
const nonProgressScreens = ['details', 'joined'];
const screenTabs = document.getElementById('screenTabs');
const videoTabs = document.getElementById('videoTabs');
function setActive(container, btn) { container.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
function updateVideoTabsState(disabled) { videoTabs.querySelectorAll('.tab-btn').forEach(b => { b.style.opacity = disabled ? '0.35' : '1'; b.style.pointerEvents = disabled ? 'none' : 'auto'; }); }
screenTabs.addEventListener('click', function(e) {
  const btn = e.target.closest('.tab-btn'); if (!btn) return;
  const state = btn.dataset.state; setActive(screenTabs, btn);
  if (nonProgressScreens.includes(state)) { updateVideoTabsState(true); loadState(state); }
  else { updateVideoTabsState(false); loadState(videoTabs.querySelector('.tab-btn.active').dataset.state); }
});
videoTabs.addEventListener('click', function(e) {
  const btn = e.target.closest('.tab-btn'); if (!btn) return;
  setActive(videoTabs, btn); setActive(screenTabs, screenTabs.querySelector('[data-state="progress"]'));
  updateVideoTabsState(false); loadState(btn.dataset.state);
});
loadState('progress');
</script>
